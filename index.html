<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title><%- title %></title>
    <!-- 设置语言属性 -->
    <meta http-equiv="Content-Language" content="zh" />

    <!-- 禁用翻译 -->
    <meta name="google" content="notranslate" />
    <meta name="google" content="noindex" />
    <meta name="google" content="nositelinkssearchbox" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <!-- 3.0版本的翻译库 -->
    <script src="https://cdn.staticfile.net/translate.js/3.2.1/translate.js"></script>
    <script>
      translate.language.setLocal("english"); //设置本地语种（当前网页的语种）。如果不设置，默认自动识别当前网页显示文字的语种。 可填写如 'english'、'chinese_simplified' 等，具体参见文档下方关于此的说明。
      translate.listener.start(); //开启html页面变化的监控，对变化部分会进行自动翻译。 具体参考
      translate.request.listener.start();
      translate.service.use("client.edge"); //设置机器翻译服务通道，直接客户端本身，不依赖服务端 。相关说明参考 http://translate.zvo.cn/43086.html
      translate.selectLanguageTag.show = false; // 隐藏语言选择框

      // translate.execute(); //进行翻译
    </script>
  </body>
</html>
