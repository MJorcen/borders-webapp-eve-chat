<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title><%- title %></title>

    <!-- 禁用翻译 -->
    <meta name="google" content="notranslate" />
    <meta name="google" content="noindex" />
    <meta name="google" content="nositelinkssearchbox" />
    <style>
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      #app-loading-wrapper {
        position: fixed;
        z-index: 99999;
        top: 29%;
        left: 50%;
        transform: translate(-50%, 0);
        line-height: 20px;
        font-size: 64px;
        color: #282828;
        text-align: center;
      }
      #app-loading-wrapper .app-loading-img {
        margin: 0 auto 4px;
        width: 260px;
        height: 260px;
        background-image: url("./public/loading.png");
        background-size: 100% 100%;
        -webkit-animation: spin 1s linear infinite;
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="app-loading-wrapper">
      <div class="app-loading-img"></div>
      <div>Loading...</div>
    </div>
    <div id="app" v-cloak></div>
    <script type="module" src="/src/main.ts"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBzdVRWmv9i2G7-mQyMaYfox-ejVPKzoro&libraries=places"
      async
      defer
    ></script>
